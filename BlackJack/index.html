<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackJack</title>
    <link rel="stylesheet" href="style.css" type="text/css">
</head>
<body>
    <header>
        <h1>BlackJack</h1>
    </header>

    <section class="game">
        <div id="game-wrapper">
            <div class="table">

        <div class="participants">
    <div class="dealer">
        <h2>Dealer</h2>
        <div class="cards" id="dealer-cards"></div>
        <p>Score: <span id="dealer-score">0</span></p>
    </div>

    <div class="player">
        <h2>Player</h2>
        <div class="cards" id="player-cards"></div>
        <p>Score: <span id="player-score">0</span></p>
    </div>
</div>

        <div class="controls">
            <button id="start-btn">Start Game</button>
            <button id="hit-btn">Hit</button>
            <button id="stand-btn">Stand</button>
        </div>

        <div class="result">
            <h2 id="result-text">Press Start to play</h2>
        </div>

    </div>
    <div class="betting" id="betting-panel">
            <h2>Betting</h2>

            <p>Balance: <span id="balance">1000</span> $</p>
            <p>Current Bet: <span id="current-bet">0</span> $</p>

            <div class="bet-buttons">
                <button class="bet-btn" data-value="10">+10</button>
                <button class="bet-btn" data-value="50">+50</button>
                <button class="bet-btn" data-value="100">+100</button>
            </div>

            <button id="clear-bet">Clear Bet</button>
        </div>
        </div>
    
</section>
    <script src="script.js"></script>
</body>
</html>
